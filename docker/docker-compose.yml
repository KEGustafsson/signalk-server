version: "2.2"
services:
  signalk-server:
    image: signalk/signalk-server-docker          # Official docker image, uncomment this to use official one and comment one below
    # image: signalk/signalk-server               # Development docker image, uncomment this to use development one and comment one above
    container_name: signalk-server
    restart: unless-stopped
    network_mode: host 
    volumes:
      - /dev:/dev/hostdev                         # Host /dev -folder is mapped to /dev/hostdev
    #-----------------------------------------------------------------------------------------------
    #  - $PWD/signalk_conf:/home/node/.signalk    # Uncomment and make signalk_conf -folder where .signalk is bind mounted
    #-----------------------------------------------------------------------------------------------
    #  - type: bind                               # 1/3 Uncomment these 3 lines to control startup.sh outside container
    #    source: $PWD/startup.sh                  # 2/3
    #    target: /home/node/signalk/startup.sh    # 3/3
    #-----------------------------------------------------------------------------------------------
    entrypoint: sh /home/node/signalk/startup.sh
    privileged: true
    logging:
      options:
        max-size: 10m
